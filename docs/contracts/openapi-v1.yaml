openapi: 3.0.3
info:
  title: DeuteriumAPP App Backend API
  version: "1.0.0"
  license:
    name: Proprietary
  description: |
    DeuteriumAPP 第一阶段 Android App 与后端 HTTP API 契约。
    WebSocket 与 Minecraft 插件桥消息详见 docs/contracts/app-backend-api-v1.md。
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: App
    description: App 版本检查等不需要登录态的轻量能力。
  - name: Account
    description: 注册、登录、验证码、密码重设、退出登录和当前用户资料。
  - name: Wallet
    description: 信用点余额、收款方搜索、转账和基础流水。
  - name: Chat
    description: 最近公共聊天、服务器在线状态、玩家目录和关心玩家列表。
paths:
  /app/update-check:
    get:
      tags: [App]
      summary: 检查当前 App 版本
      description: 后端只读取版本配置，不访问数据库。
      security: []
      operationId: checkAppUpdate
      parameters:
        - name: versionCode
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
        - name: versionName
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: 当前版本状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUpdateCheckResponse"
        default:
          $ref: "#/components/responses/Error"
  /account/registration-code:
    post:
      tags: [Account]
      summary: 请求注册验证码
      security: []
      operationId: requestRegistrationCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationCodeRequest"
      responses:
        "200":
          description: 验证码已通过服务器私聊发送
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationTokenResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /account/register:
    post:
      tags: [Account]
      summary: 提交注册
      security: []
      operationId: registerAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功并进入登录态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /account/login:
    post:
      tags: [Account]
      summary: 登录
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /account/password-reset-code:
    post:
      tags: [Account]
      summary: 请求密码重设验证码
      security: []
      operationId: requestPasswordResetCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetCodeRequest"
      responses:
        "200":
          description: 改密验证码已通过服务器私聊发送
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationTokenResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /account/password-reset:
    post:
      tags: [Account]
      summary: 提交新密码
      security: []
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: 密码已重设
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /account/logout:
    post:
      tags: [Account]
      summary: 退出当前设备登录
      operationId: logout
      responses:
        "200":
          description: 当前 token 已失效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /account/me:
    get:
      tags: [Account]
      summary: 获取当前用户资料
      operationId: getCurrentUser
      responses:
        "200":
          description: 当前用户资料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /wallet/balance:
    get:
      tags: [Wallet]
      summary: 获取当前已知余额
      operationId: getWalletBalance
      responses:
        "200":
          description: 当前已知余额
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalanceResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /wallet/balance/refresh:
    post:
      tags: [Wallet]
      summary: 刷新信用点余额
      operationId: refreshWalletBalance
      responses:
        "200":
          description: 刷新后的余额
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalanceResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /wallet/recipients/search:
    get:
      tags: [Wallet]
      summary: 搜索收款玩家
      operationId: searchRecipients
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecipientSearchType"
          description: 默认 auto
      responses:
        "200":
          description: 候选收款玩家
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipientSearchResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /wallet/transfers:
    post:
      tags: [Wallet]
      summary: 提交信用点转账
      operationId: createTransfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferRequest"
      responses:
        "200":
          description: 转账已处理或进入可查询状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponse"
        "202":
          description: 转账结果未知或处理中，需要后续查询
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /wallet/transfers/{transferId}:
    get:
      tags: [Wallet]
      summary: 查询转账结果
      operationId: getTransfer
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 转账详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /wallet/records:
    get:
      tags: [Wallet]
      summary: 获取基础信用点流水
      operationId: listWalletRecords
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/AfterRecordId"
      responses:
        "200":
          description: 基础流水
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletRecordsResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /chat/messages:
    get:
      tags: [Chat]
      summary: 获取最近公共聊天
      operationId: listChatMessages
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: before
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: 公共聊天消息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagesResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /chat/presence:
    get:
      tags: [Chat]
      summary: 获取服务器在线概览
      operationId: getChatPresence
      responses:
        "200":
          description: 在线人数
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /chat/online-players:
    get:
      tags: [Chat]
      summary: 获取服务器在线玩家列表
      operationId: listOnlinePlayers
      responses:
        "200":
          description: 在线玩家列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnlinePlayersResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /chat/player-directory:
    get:
      tags: [Chat]
      summary: 获取玩家目录
      description: 服务器当前在线玩家优先，其后为已注册 App 玩家。
      operationId: listPlayerDirectory
      responses:
        "200":
          description: 玩家目录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDirectoryResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /chat/follows:
    get:
      tags: [Chat]
      summary: 获取当前账号关心玩家
      operationId: listFollowedPlayers
      responses:
        "200":
          description: 已关心玩家
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowedPlayersResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Chat]
      summary: 关心玩家
      operationId: followPlayer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerFollowRequest"
      responses:
        "200":
          description: 关心状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerFollowResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /chat/follows/{playerRef}:
    delete:
      tags: [Chat]
      summary: 取消关心玩家
      operationId: unfollowPlayer
      parameters:
        - name: playerRef
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 关心状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerFollowResponse"
        "400":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    AfterRecordId:
      name: afterRecordId
      in: query
      required: false
      description: 传入后只返回该流水之后的新流水，供离线增量同步使用。
      schema:
        type: string
  responses:
    Error:
      description: 统一错误响应
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    RequestId:
      type: string
      example: req_01HV0000000000000000000000
    ApiResponseBase:
      type: object
      required: [requestId]
      properties:
        requestId:
          $ref: "#/components/schemas/RequestId"
    AppUpdateCheckData:
      type: object
      required: [latest, message, latestVersionCode, latestVersionName]
      properties:
        latest:
          type: boolean
        message:
          type: string
          enum: [当前已是最新版本, 版本已过时，请更新最新版本]
        latestVersionCode:
          type: integer
        latestVersionName:
          type: string
    AppUpdateCheckResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/AppUpdateCheckData"
    Page:
      type: object
      required: [nextCursor]
      properties:
        nextCursor:
          type: string
          nullable: true
    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [error]
          properties:
            error:
              $ref: "#/components/schemas/ErrorBody"
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - INVALID_REQUEST
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - RATE_LIMITED
            - SERVER_UNAVAILABLE
            - PLUGIN_BRIDGE_UNAVAILABLE
            - PLAYER_NOT_ONLINE
            - PLAYER_NOT_FOUND
            - PLAYER_IDENTITY_CONFLICT
            - QQ_ALREADY_USED
            - UUID_ALREADY_REGISTERED
            - VERIFICATION_COOLDOWN
            - VERIFICATION_INVALID
            - VERIFICATION_EXPIRED
            - VERIFICATION_ATTEMPTS_EXCEEDED
            - PASSWORD_INVALID
            - ACCOUNT_PASSWORD_INVALID
            - LOGIN_LOCKED
            - AMOUNT_INVALID
            - RECIPIENT_NOT_FOUND
            - RECIPIENT_IDENTITY_UNCONFIRMED
            - BALANCE_INSUFFICIENT
            - TRANSFER_DUPLICATE
            - TRANSFER_FAILED
            - TRANSFER_RESULT_UNKNOWN
            - CHAT_CONNECTION_UNAVAILABLE
            - CHAT_MESSAGE_EMPTY
            - CHAT_MESSAGE_TOO_LONG
            - CHAT_SEND_FAILED
            - SENDER_IDENTITY_UNCONFIRMED
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        retryAfterSeconds:
          type: integer
          minimum: 0
    RegistrationCodeRequest:
      type: object
      required: [gameId, qq, password]
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
        qq:
          type: string
          minLength: 1
          maxLength: 20
        password:
          type: string
          minLength: 8
          maxLength: 64
          format: password
    RegisterRequest:
      type: object
      required: [verificationToken, code, password]
      properties:
        verificationToken:
          type: string
        code:
          type: string
          pattern: "^\\d{6}$"
        password:
          type: string
          minLength: 8
          maxLength: 64
          format: password
    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          maxLength: 64
          format: password
    PasswordResetCodeRequest:
      type: object
      required: [account]
      properties:
        account:
          type: string
          minLength: 1
    PasswordResetRequest:
      type: object
      required: [verificationToken, code, newPassword]
      properties:
        verificationToken:
          type: string
        code:
          type: string
          pattern: "^\\d{6}$"
        newPassword:
          type: string
          minLength: 8
          maxLength: 64
          format: password
    VerificationTokenData:
      type: object
      required: [verificationToken, expiresAt, resendAfterSeconds]
      properties:
        verificationToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        resendAfterSeconds:
          type: integer
          minimum: 0
    VerificationTokenResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/VerificationTokenData"
    AuthData:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
    AuthResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/AuthData"
    PasswordResetData:
      type: object
      required: [passwordReset]
      properties:
        passwordReset:
          type: boolean
    PasswordResetResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/PasswordResetData"
    LogoutData:
      type: object
      required: [loggedOut]
      properties:
        loggedOut:
          type: boolean
    LogoutResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/LogoutData"
    UserProfile:
      type: object
      required: [userId, playerRef, gameId, qq, identityStatus]
      properties:
        userId:
          type: string
        playerRef:
          type: string
          description: Opaque player reference returned by backend.
        gameId:
          type: string
        qq:
          type: string
        identityStatus:
          type: string
          enum: [bound]
    UserProfileData:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
    UserProfileResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/UserProfileData"
    PlayerSummary:
      type: object
      required: [playerRef, gameId, online, registered, source]
      properties:
        playerRef:
          type: string
          description: Opaque player reference. Android must not parse it.
        gameId:
          type: string
        qq:
          type: string
          nullable: true
        online:
          type: boolean
        registered:
          type: boolean
        source:
          type: string
          enum: [game_id, qq, search, online_list]
    WalletBalance:
      type: object
      required: [currency, amount, fresh, refreshedAt]
      properties:
        currency:
          type: string
          enum: [CREDIT]
        amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,2})?$"
          example: "1820.50"
        fresh:
          type: boolean
        refreshedAt:
          type: string
          format: date-time
          nullable: true
    WalletBalanceData:
      type: object
      required: [balance]
      properties:
        balance:
          $ref: "#/components/schemas/WalletBalance"
    WalletBalanceResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/WalletBalanceData"
    RecipientSearchType:
      type: string
      enum: [auto, game_id, qq, search]
      default: auto
    RecipientSearchData:
      type: object
      required: [candidates]
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/ResolvedPlayerRef"
    RecipientSearchResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/RecipientSearchData"
    ResolvedPlayerRef:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
        - type: object
          required: [confirmedAt]
          properties:
            confirmedAt:
              type: string
              format: date-time
            expiresAt:
              type: string
              format: date-time
              nullable: true
    CreateTransferRequest:
      type: object
      required: [clientRequestId, recipientPlayerRef, amount]
      properties:
        clientRequestId:
          type: string
          minLength: 1
          maxLength: 128
        recipientPlayerRef:
          type: string
        amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,2})?$"
        note:
          type: string
          maxLength: 80
          nullable: true
    TransferStatus:
      type: string
      enum: [processing, success, failed, unknown]
    Transfer:
      type: object
      required: [transferId, clientRequestId, recipient, amount, currency, status, createdAt, updatedAt]
      properties:
        transferId:
          type: string
        clientRequestId:
          type: string
        recipient:
          $ref: "#/components/schemas/PlayerSummary"
        amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,2})?$"
        currency:
          type: string
          enum: [CREDIT]
        note:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TransferStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TransferData:
      type: object
      required: [transfer]
      properties:
        transfer:
          $ref: "#/components/schemas/Transfer"
    TransferResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/TransferData"
    WalletRecordDirection:
      type: string
      enum: [income, expense]
    WalletRecord:
      type: object
      required: [recordId, direction, otherPlayer, amount, currency, status, occurredAt]
      properties:
        recordId:
          type: string
        direction:
          $ref: "#/components/schemas/WalletRecordDirection"
        otherPlayer:
          $ref: "#/components/schemas/PlayerSummary"
        amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,2})?$"
        currency:
          type: string
          enum: [CREDIT]
        status:
          $ref: "#/components/schemas/TransferStatus"
        note:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
    WalletRecordsData:
      type: object
      required: [records]
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/WalletRecord"
    WalletRecordsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          required: [data, page]
          properties:
            data:
              $ref: "#/components/schemas/WalletRecordsData"
            page:
              $ref: "#/components/schemas/Page"
    ChatMessage:
      type: object
      required: [messageId, sender, content, kind, sentAt]
      properties:
        messageId:
          type: string
        sender:
